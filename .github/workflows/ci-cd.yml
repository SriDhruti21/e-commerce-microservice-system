name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies (User Service)
        run: |
          cd user-service
          npm ci

      - name: Run Tests (User Service)
        run: |
          cd user-service
          npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push User Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service

      - name: Build & Push Order Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service ./order-service
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service