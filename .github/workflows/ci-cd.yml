name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  test-user-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm ci
      - run: npm test

  test-order-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm ci
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-user-service, test-order-service]

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push User Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service

      - name: Build & Push Order Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service ./order-service
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service